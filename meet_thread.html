<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<meta name="supported-color-schemes" content="light">
<title>MEET [IN] CHINA — Order thread</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.png" sizes="any">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Manrope:wght@500;600;700;800&family=DM+Mono:wght@400;500&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<script>document.documentElement.className='js';</script>
<style>
  html{color-scheme:only light; background:#FAF7F1 !important;}
  :root{--paper:#FAF7F1; --ink:#0F0B07; --body:#2B241B; --muted:#6E6252;
    --verm:#9E3322; --verm2:#B5412B; --gold:#C2913F; --goldL:#E0BC74; --hair:#E2DACB; --cream:#F4EAD2; --ok:#5E7A3A;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:#FAF7F1 !important; color:var(--body); font-size:16px; font-weight:500; line-height:1.55;
       font-family:'Manrope',-apple-system,'Segoe UI',Roboto,Arial,sans-serif; overflow-x:hidden; display:flex; flex-direction:column; min-height:100vh;}
  .brk{color:var(--verm);} a{color:inherit;} :focus-visible{outline:2.5px solid var(--verm); outline-offset:3px;}
  .topbar{background:rgba(15,11,7,.96); border-bottom:1px solid #221A11; flex:none;}
  .topbar .in{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 20px; max-width:760px; margin:0 auto;}
  .wm{font-family:'Manrope'; font-weight:800; font-size:14px; letter-spacing:.04em; color:var(--cream); text-decoration:none; white-space:nowrap;}
  .back{font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#B7A98D; text-decoration:none;}
  .back:hover{color:var(--goldL);}
  .ctx{background:var(--ink); color:var(--cream); flex:none;}
  .ctx .in{max-width:760px; margin:0 auto; padding:14px 20px;}
  .ctx .o{font-family:'Manrope'; font-weight:800; font-size:16px;}
  .ctx .m{font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#9C8E76; margin-top:3px;}
  .ctx .m .cn{font-family:'Noto Serif SC',serif; color:var(--goldL); margin:0 2px;}
  .preview{background:#1C150D; color:#B7A98D; font-family:'DM Mono',monospace; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; text-align:center; padding:6px; flex:none;}

  .thread{flex:1; overflow-y:auto; padding:22px 0 14px;}
  .twrap{max-width:760px; margin:0 auto; padding:0 20px; display:flex; flex-direction:column; gap:16px;}
  .day-sep{text-align:center; font-family:'DM Mono',monospace; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:4px 0;}
  .msg{max-width:78%; display:flex; flex-direction:column; gap:5px;}
  .msg.me{align-self:flex-end; align-items:flex-end;}
  .msg .meta{font-family:'DM Mono',monospace; font-size:10.5px; letter-spacing:.06em; color:var(--muted);}
  .msg .meta b{color:var(--ink); font-weight:500;}
  .msg .role{font-size:9px; letter-spacing:.1em; text-transform:uppercase; padding:2px 6px; margin-left:6px; border:1px solid;}
  .role-coord{color:var(--verm); border-color:var(--verm);}
  .role-interp{color:#8a6520; border-color:var(--gold);}
  .role-client{color:var(--muted); border-color:var(--hair);}
  .bubble{padding:12px 15px; font-size:14.5px; line-height:1.5; border:1px solid var(--hair); background:#fff; color:var(--body);}
  .msg.coord .bubble{border-left:3px solid var(--verm);}
  .msg.interp .bubble{border-left:3px solid var(--gold);}
  .msg.me .bubble{background:var(--ink); color:var(--cream); border-color:var(--ink);}

  .composer{flex:none; border-top:1px solid var(--hair); background:var(--paper);}
  .composer .in{max-width:760px; margin:0 auto; padding:12px 20px; display:flex; gap:10px; align-items:flex-end;}
  .composer textarea{flex:1; resize:none; font-family:'Manrope'; font-size:15px; color:var(--ink); background:#fff; border:1.5px solid var(--hair); padding:12px 14px; max-height:120px; line-height:1.4;}
  .composer textarea:focus{outline:none; border-color:var(--verm);}
  .composer button{font-family:'Manrope'; font-weight:700; font-size:14px; padding:13px 20px; border:none; cursor:pointer; background:var(--verm); color:#fff; transition:background .2s, transform .12s; flex:none;}
  .composer button:hover{background:var(--verm2); transform:translateY(-1px);}
  .asnote{max-width:760px; margin:0 auto; padding:0 20px 10px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.04em; color:#A99B82;}
  @media (prefers-reduced-motion:reduce){ *{animation:none!important; transition:none!important;} }
  @media (prefers-color-scheme:dark){ html,body{background:#FAF7F1 !important;} body{color:#2B241B !important;} }
</style>
</head>
<body>

<nav class="topbar"><div class="in">
  <a class="wm" href="meetinchina_landing.html">MEET <span class="brk">[</span>IN<span class="brk">]</span> CHINA</a>
  <a class="back" id="backLink" href="meet_cabinet_client.html">&larr; Back to cabinet</a>
</div></nav>
<div class="ctx"><div class="in">
  <div class="o">Pharma sourcing — 2 suppliers</div>
  <div class="m">Order MIC-0042 · <span class="cn">广州</span> Guangzhou · on the ground today</div>
</div></div>
<div class="preview" id="previewBar">Order thread · preview · sample data</div>

<div class="thread" id="thread"><div class="twrap" id="twrap">
  <div class="day-sep">Today</div>
</div></div>

<div class="composer">
  <div class="in">
    <textarea id="box" rows="1" placeholder="Message the team…" aria-label="Message"></textarea>
    <button id="send" type="button">Send</button>
  </div>
  <div class="asnote" id="asnote"></div>
</div>

<script>
(function(){
  var as=(location.search.match(/[?&]as=(client|interpreter)/i)||[])[1];
  as=(as?as.toLowerCase():'client');
  var asKey=(as==='interpreter'?'interp':'client');
  document.getElementById('backLink').setAttribute('href', as==='interpreter'?'meet_cabinet_interpreter.html':'meet_cabinet_client.html');
  document.getElementById('asnote').textContent = 'You are viewing as the '+as+'. Prototype — messages are local to this preview.';

  // roles: coord (MEET), interp (Li Wenjing), client (Nordwerk)
  var seed=[
    {who:'coord', name:'Sofia · MEET', role:'Coordinator', t:'09:02', text:'Morning — I’m Sofia, your MEET coordinator on this order. Li Wenjing is confirmed on the ground today.'},
    {who:'client', name:'Nordwerk GmbH', role:'Client', t:'09:08', text:'Great. Can Li also check the QC process on supplier B’s line 2?'},
    {who:'coord', name:'Sofia · MEET', role:'Coordinator', t:'09:10', text:'Adding it to the brief now. Li — can you cover QC on line 2 and photograph it?'},
    {who:'interp', name:'Li Wenjing', role:'Interpreter', t:'09:14', text:'Yes — I’ll walk line 2, note the QC steps and get clear photos. At supplier A now, B after lunch.'},
    {who:'coord', name:'Sofia · MEET', role:'Coordinator', t:'09:15', text:'Perfect. You’ll have the full report room filled in this evening.'}
  ];
  var twrap=document.getElementById('twrap');
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function add(m){
    var mine=(m.who===asKey);
    var el=document.createElement('div');
    el.className='msg '+m.who+(mine?' me':'');
    var roleCls = m.who==='coord'?'role-coord':(m.who==='interp'?'role-interp':'role-client');
    el.innerHTML='<div class="meta"><b>'+esc(m.name)+'</b><span class="role '+roleCls+'">'+esc(m.role)+'</span> · '+esc(m.t)+'</div>'+
                 '<div class="bubble">'+esc(m.text)+'</div>';
    twrap.appendChild(el);
  }
  seed.forEach(add);
  var thread=document.getElementById('thread'); thread.scrollTop=thread.scrollHeight;

  var box=document.getElementById('box');
  box.addEventListener('input',function(){ box.style.height='auto'; box.style.height=Math.min(120,box.scrollHeight)+'px'; });
  function send(){
    var v=box.value.trim(); if(!v) return;
    var meName = as==='interpreter' ? 'Li Wenjing' : 'Nordwerk GmbH';
    var meRole = as==='interpreter' ? 'Interpreter' : 'Client';
    var now=new Date(); var hh=('0'+now.getHours()).slice(-2), mm=('0'+now.getMinutes()).slice(-2);
    add({who:asKey, name:meName, role:meRole, t:hh+':'+mm, text:v});
    box.value=''; box.style.height='auto';
    thread.scrollTop=thread.scrollHeight;
  }
  document.getElementById('send').addEventListener('click', send);
  box.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
})();
</script>
</body>
</html>
